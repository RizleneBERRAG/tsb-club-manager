name: pages build and deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Configure Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Start Laravel server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > /tmp/laravel.log 2>&1 &
          sleep 6

      - name: Build static preview
        run: |
          mkdir -p _site/contact
          cp -R public/assets _site/assets
          cp public/favicon.ico _site/favicon.ico || true
          cp public/robots.txt _site/robots.txt || true
          touch _site/.nojekyll

          curl -L http://127.0.0.1:8000/ -o _site/index.html
          curl -L http://127.0.0.1:8000/contact -o _site/contact/index.html

          python3 - <<'PY'
          from pathlib import Path

          base = "/tsb-club-manager"
          files = [
              Path("_site/index.html"),
              Path("_site/contact/index.html"),
          ]

          replacements = {
              'href="/assets/': f'href="{base}/assets/',
              'src="/assets/': f'src="{base}/assets/',
              'poster="/assets/': f'poster="{base}/assets/',
              '<source src="/assets/': f'<source src="{base}/assets/',
              'href="/contact"': f'href="{base}/contact/"',
              'href="/contact/': f'href="{base}/contact/',
              'href="/#': f'href="{base}/#',
              'href="/"': f'href="{base}/"',
          }

          for file in files:
              html = file.read_text(encoding="utf-8")

              for host in [
                  "http://127.0.0.1:8000",
                  "http://localhost:8000",
                  "http://localhost",
              ]:
                  html = html.replace(host, "")

              for old, new in replacements.items():
                  html = html.replace(old, new)

              file.write_text(html, encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4